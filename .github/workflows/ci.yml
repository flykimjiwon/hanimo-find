name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  quality:
    name: Rust stable (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install stable Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup override set stable
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Check all targets and features
        run: cargo check --workspace --all-targets --all-features --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-targets --all-features --locked

  msrv:
    name: MSRV 1.88.0
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install MSRV
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Check at MSRV
        run: cargo +1.88.0 check --workspace --all-targets --all-features --locked
